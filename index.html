<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My News Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            padding: 20px;
        }

        .about {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .news {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        .news-item {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            display: block;
            margin: 5px 0;
            color: blue;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header>
    TechNovaX News
</header>

<div class="container">

    <!-- About Section -->
    <div class="about">
        <h2>About Today News</h2>
        <p>
            Aaj ki news mein desh aur duniya ki latest khabrein di jaati hain.
            Yahan aapko technology, government jobs, aur current affairs ki jankari milegi.
        </p>
    </div>

    <!-- News Section -->
    <div class="news">
        <h2>Latest News</h2>
        <div id="newsContainer"></div>
    </div>

    <!-- External Links -->
    <div class="links">
        <h3>Important Links</h3>
        <a href="https://www.sarkariresult.com" target="_blank">Sarkari Result</a>
        <a href="https://www.livehindustan.com" target="_blank">Hindustan News</a>
        <a href="https://indianexpress.com" target="_blank">The Indian News</a>
    </div>

</div>

<script>
    // Sample dynamic news data
    const newsData = [
        "India mein naye technology startup ka boom",
        "Sarkari naukri ke naye form release",
        "AI aur future tech ka fast growth",
        "Stock market mein aaj tezi dekhi gayi",
        "UP mein naye development projects shuru"
    ];

    const newsContainer = document.getElementById("newsContainer");

    newsData.forEach(news => {
        const div = document.createElement("div");
        div.className = "news-item";
        div.innerText = news;
        newsContainer.appendChild(div);
    });
</script>

</body>
</html>
